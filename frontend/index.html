<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberGuard — Cybersecurity Awareness Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">🛡️</div>
        <div>
          <h1>CyberGuard</h1>
          <span class="status">Online — Ready to help</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="quiz-btn" id="quizBtn">🎯 Quiz Mode</button>
        <button class="new-chat-btn" id="newChatBtn">New Chat</button>
      </div>
    </div>

    <!-- Quick Topic Buttons -->
    <div class="topics-bar">
      <button class="topic-btn" data-topic="What is phishing and how do I spot it?">Phishing</button>
      <button class="topic-btn" data-topic="How do I create strong passwords and stay safe?">Passwords</button>
      <button class="topic-btn" data-topic="What is MFA and how do I enable it?">MFA</button>
      <button class="topic-btn" data-topic="How do I recognise and avoid online scams?">Scams</button>
      <button class="topic-btn" data-topic="How do I browse the internet safely?">Safe Browsing</button>
      <button class="topic-btn" data-topic="Is public Wi-Fi safe to use?">Public Wi-Fi</button>
      <button class="topic-btn" data-topic="Why are software updates important?">Updates</button>
      <button class="topic-btn" data-topic="How do I protect my privacy on social media?">Social Media</button>
    </div>

    <!-- Quiz Mode Banner -->
    <div class="quiz-banner" id="quizBanner">
      🎯 Quiz Mode Active — Answer each question to test your knowledge. Click <strong>Exit Quiz</strong> to return to normal chat.
    </div>

    <!-- Chat Messages Window -->
    <div class="chat-window" id="chatWindow">
      <!-- Messages will appear here -->
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Ask me anything about staying safe online..."
        autocomplete="off"
      />
      <button id="sendBtn">Send</button>
    </div>

    <!-- Disclaimer -->
    <div class="disclaimer">
      For educational purposes only. CyberGuard does not provide legal or professional security advice.
    </div>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
